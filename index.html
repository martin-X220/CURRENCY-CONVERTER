<!doctype html>
<html lang="en">
  <head>
    <meta
      name="description"
      content="Live currency converter for USD to NGN, EUR, GBP and 160+ Currency Converter, Live Exchange Rate, Free currency converter with CBN + black market rates for nigerian."
    />
    <meta
      name="keywords"
      content="Currency Converter, USD to NGN, EUR, GBP, Live Exchange Rate, CBN Rate, Fast Currency Converter"
    />
    <title>
      Live Currency Converter |USD to NGN, EUR. GBP + 160 RATES | Fastconverter
    </title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>Currency Converter - Live Exchange Rates</h1>
      <!-- <p>Convert currencies in real-time with our live currency converter. Get accurate exchange rates for USD, NGN, EUR, GBP, and over 160 other currencies.</p> -->

      <h2>USD to NGN</h2>
      <h2>EUR to USD</h2>
      <h2>GBP to NGN</h2>
      <form id="converter-form">
        <div class="form-group">
          <label for="amount">Amount:</label>
          <input
            type="number"
            id="amount"
            placeholder="Enter amount"
            required
          />
        </div>

        <div class="form-group">
          <label for="from-currency">From:</label>
          <select id="from-currency">
            <!-- currency options will be inserted from our api-->
          </select>
        </div>

        <div class="form-group">
          <label for="to-currency">To:</label>
          <select id="to-currency">
            <!-- currency options will be inserted from our api-->
          </select>
        </div>

        <button type="submit">Convert</button>
      </form>

      <div id="result">0 NGN</div>
      <div id="last-updated" style="font-size: 12px; color: #666; margin-top: 8px; text-align: center;"></div>
      Last Updated: <span id="last-updated"></span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
